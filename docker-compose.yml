services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run dev -- --hostname 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: roomflow
      POSTGRES_USER: roomflow
      POSTGRES_PASSWORD: roomflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roomflow -d roomflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
